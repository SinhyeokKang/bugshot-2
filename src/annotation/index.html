<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: rgba(0, 0, 0, 0.85); }
      #container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      #target-image {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
        display: block;
      }
      #toolbar {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        z-index: 10000;
      }
      #toolbar button {
        padding: 8px 20px;
        border-radius: 8px;
        border: none;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      #toolbar button:hover { opacity: 0.85; }
      #btn-done {
        background: #2563eb;
        color: white;
      }
      #btn-cancel {
        background: rgba(255, 255, 255, 0.15);
        color: white;
      }
      .loading {
        color: white;
        font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div class="loading">이미지 로드 중...</div>
    </div>
    <div id="toolbar" style="display: none">
      <button id="btn-cancel">취소</button>
      <button id="btn-done">주석 완료</button>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
