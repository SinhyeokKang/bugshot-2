<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>bugshot e2e fixture</title>
    <style>
      /* 디자인 토큰 — hint 갱신/분류 회귀 검증용.
         --brand: named color(categorizeToken color 분류), --space-0: unitless 0(length 분류). */
      :root {
        --space-sm: 8px;
        --space-lg: 32px;
        --brand: tomato;
        --space-0: 0;
      }
      body {
        margin: 24px;
        font-family: sans-serif;
      }
      /* #title은 color·padding을 명시 — typography/layout 섹션 defaultOpen 유도 */
      #title {
        color: rgb(17, 24, 39);
        padding: 8px 8px 8px 8px;
      }
      .card {
        border: 1px solid #cccccc;
        border-radius: 8px;
      }
      .box {
        padding: 16px;
        margin-top: 12px;
        width: 240px;
      }
      #filler {
        height: 2000px;
      }
      /* 전수 검수용 스와치 — 각 섹션(layout/container/size/typography/effects)이 모두
         specified를 가져 defaultOpen 되도록 명시. quad/radius는 4면 동일값으로 collapse 기준값 제공. */
      .swatch {
        display: block;
        padding: 12px 12px 12px 12px;
        margin-bottom: 10px;
        background-color: rgb(240, 240, 240);
        border: 1px solid #dddddd;
        border-radius: 4px;
        color: rgb(50, 50, 50);
        width: 200px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>
  <body>
    <h1 id="title">Fixture Title</h1>
    <div id="card" class="card box">Card text content</div>
    <section id="palette">
      <div id="el1" class="swatch">Element One</div>
      <div id="el2" class="swatch">Element Two</div>
      <div id="el3" class="swatch">Element Three</div>
    </section>
    <!-- #quad: 4면 padding 상이 — linked 재선택 자동 해제(E) 검증용 -->
    <div
      id="quad"
      style="padding: 4px 8px 12px 16px; background-color: rgb(238, 238, 238); width: 200px; min-height: 40px;"
    >
      Quad Element
    </div>
    <!-- #multi: width에 multiplier 토큰 calc(var(--space-sm) * 2) — multiplier hint(16px) 검증용 -->
    <div
      id="multi"
      style="width: calc(var(--space-sm) * 2); min-height: 40px; background-color: rgb(235, 235, 235);"
    >
      Multi Element
    </div>
    <!-- #clip: text-overflow ellipsis 명시 — SelectProp unset(원본 author 무력화) 검증용 -->
    <div
      id="clip"
      style="width: 80px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; background-color: rgb(233, 233, 233);"
    >
      Very long clipped content here
    </div>
    <div id="filler"></div>
  </body>
</html>
