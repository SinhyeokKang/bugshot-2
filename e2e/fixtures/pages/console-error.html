<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>console-error</title>
  </head>
  <body>
    <p>console error fixture</p>
    <!-- 정적 인라인 스크립트라야 throw 스택 프레임·ErrorEvent.filename이 page URL로 찍힌다.
         동적 주입(createElement+textContent) 스크립트는 filename이 비어 URL이 안 들어간다. -->
    <script>
      function bugshotBoom() {
        throw new Error("E2E_STACK_ERR");
      }
      window.__bugshotThrow = function () {
        setTimeout(bugshotBoom, 0);
      };
    </script>
  </body>
</html>
