<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>bugshot e2e action fixture</title>
    <style>
      body {
        margin: 24px;
        font-family: sans-serif;
      }
      button,
      input {
        display: block;
        margin-bottom: 12px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <!-- action recorder 입력: click(button) / input(textbox) / navigation(hashchange anchor + bind load) -->
    <button id="action-btn" type="button">Submit Report</button>
    <input id="action-input" aria-label="Bug Summary" type="text" />
    <a id="action-nav" href="#details">Go to details</a>
    <section id="details">details section</section>
  </body>
</html>
