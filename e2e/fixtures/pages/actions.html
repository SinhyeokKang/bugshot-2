<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>bugshot e2e action fixture</title>
    <style>
      body {
        margin: 24px;
        font-family: sans-serif;
      }
      button,
      input {
        display: block;
        margin-bottom: 12px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <!-- action recorder 입력: click(button) / input(textbox) / navigation(hashchange anchor + bind load) -->
    <button id="action-btn" type="button">Submit Report</button>
    <input id="action-input" aria-label="Bug Summary" type="text" />
    <a id="action-nav" href="#details">Go to details</a>
    <section id="details">details section</section>

    <!-- 접근성 이름 없는 인터랙티브 요소: click 시 tag 모드(<button type="submit">) 판정용 -->
    <button id="action-noname" type="submit" style="width: 80px; height: 24px"></button>

    <!-- toggle/select/keypress 커버리지: checkbox(직접) / label[for] 연결 checkbox / radio / select -->
    <input id="action-check" aria-label="Subscribe" type="checkbox" />
    <label id="action-check-label" for="action-check-labeled">Accept terms</label>
    <input id="action-check-labeled" type="checkbox" />
    <input id="action-radio" aria-label="Pro plan" name="plan" type="radio" />
    <select id="action-select" aria-label="Country">
      <option value="">Choose…</option>
      <option value="kr">Korea</option>
      <option value="jp">Japan</option>
    </select>

    <!-- 드래그: 네이티브 HTML5 DnD(draggable=true) source + drop zone. drag source+target 판정용.
         Playwright는 real native drag를 못 일으켜 spec이 합성 DragEvent를 dispatch한다(handler는 현실성용). -->
    <div
      id="drag-native-src"
      draggable="true"
      aria-label="Draggable card"
      style="width: 90px; height: 40px; border: 1px solid #333"
    >
      card
    </div>
    <div
      id="drag-native-zone"
      aria-label="Inbox dropzone"
      style="width: 140px; height: 60px; border: 1px dashed #888"
    ></div>

    <!-- 드래그: 포인터 휴리스틱 — source에서 임계 초과로 끌어 다른 요소(zone) 위에서 뗌. drag source-only 판정용.
         user-select:none은 실제 dnd 드래그 핸들 관습 — 드래그가 텍스트 선택으로 안 빠져야 레코더의
         텍스트선택 가드(getSelection isCollapsed)를 통과해 drag로 기록된다. -->
    <div
      id="drag-pointer-src"
      aria-label="Pointer handle"
      style="width: 60px; height: 60px; background: #ddd; user-select: none; -webkit-user-select: none"
    ></div>
    <div
      id="drag-pointer-zone"
      aria-label="Pointer target"
      style="width: 220px; height: 90px; background: #f0f0f0; user-select: none; -webkit-user-select: none"
    ></div>

    <script>
      const zone = document.getElementById("drag-native-zone");
      zone.addEventListener("dragover", (e) => e.preventDefault());
      zone.addEventListener("drop", (e) => e.preventDefault());
    </script>
  </body>
</html>
