name = "bugshot-oauth"
main = "worker.ts"
compatibility_date = "2026-04-01"

# 배포 전:
#   wrangler secret put ATLASSIAN_CLIENT_ID
#   wrangler secret put ATLASSIAN_CLIENT_SECRET
#
# (선택) 특정 확장 origin만 허용하려면:
#   wrangler secret put ALLOWED_ORIGINS
#   값 예시: chrome-extension://abcdefghij...,chrome-extension://xxx...
#   설정하지 않으면 모든 origin 허용.
#
# 배포:
#   wrangler deploy
