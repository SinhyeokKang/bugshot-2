name = "bugshot-oauth"
main = "worker.ts"
compatibility_date = "2026-04-01"

# 배포 전 필수 secret:
#   wrangler secret put ATLASSIAN_CLIENT_ID
#   wrangler secret put ATLASSIAN_CLIENT_SECRET
#   wrangler secret put ALLOWED_ORIGINS
#
# GitHub OAuth 사용 시 추가 (DEV/PROD 두 OAuth App 동시 운영):
#   wrangler secret put GITHUB_CLIENT_ID_DEV
#   wrangler secret put GITHUB_CLIENT_SECRET_DEV
#   wrangler secret put GITHUB_CLIENT_ID_PROD       # 웹스토어 출시 시
#   wrangler secret put GITHUB_CLIENT_SECRET_PROD   # 웹스토어 출시 시
#   - 클라이언트가 보낸 client_id로 매칭해서 secret 선택 (화이트리스트 효과)
#   - DEV만 등록돼 있으면 PROD client_id 요청은 400 반환
#   - 둘 다 비어있으면 503
#
# Notion OAuth 사용 시 추가:
#   wrangler secret put NOTION_CLIENT_ID
#   wrangler secret put NOTION_CLIENT_SECRET
#
# Asana OAuth 사용 시 추가 (confidential app, app 1개에 dev/prod redirect URI 등록):
#   wrangler secret put ASANA_CLIENT_ID
#   wrangler secret put ASANA_CLIENT_SECRET
#
# ClickUp OAuth 사용 시 추가 (confidential app, app 1개에 dev/store redirect URI 등록):
#   wrangler secret put CLICKUP_CLIENT_ID       # 확장의 VITE_CLICKUP_CLIENT_ID와 동일 값 (client_id 화이트리스트 매칭용)
#   wrangler secret put CLICKUP_CLIENT_SECRET
#   - 토큰 만료 없음 → /clickup/token(auth code 교환)만, refresh 라우트 없음
#
# ALLOWED_ORIGINS 값 예시:
#   chrome-extension://abcdefghij...,chrome-extension://xxxxxxxxxx...
#   - 프로덕션 확장 ID + 로컬 dev key의 ID를 콤마로 나열
#   - 와일드카드 필요 시 단독 "*" (운영에서는 권장하지 않음)
#   - 미설정 시 모든 origin이 403 거부됨
#
# 배포:
#   wrangler deploy
